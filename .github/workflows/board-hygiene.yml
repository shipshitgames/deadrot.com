name: Board hygiene

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without writing to GitHub Projects"
        required: true
        default: true
        type: boolean
      rate_floor:
        description: "Stop before writes when GraphQL remaining drops below this"
        required: true
        default: "1500"
        type: string
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: board-hygiene
  cancel-in-progress: false

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOARD_BOT_APP_ID }}
          private-key: ${{ secrets.BOARD_BOT_PRIVATE_KEY }}
          owner: shipshitgames
          repositories: deadrot.com

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run board hygiene
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BOARD_HYGIENE_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          BOARD_HYGIENE_GRAPHQL_RATE_FLOOR: ${{ inputs.rate_floor || '1500' }}
          BOARD_HYGIENE_PROJECTS: "1,3,4,5,6,7,8,9,10,11"
          BOARD_HYGIENE_CHUNK_SIZE: "8"
          BOARD_HYGIENE_SLEEP_MS: "1500"
        run: node scripts/board-hygiene.mjs
