name: CI

# Fast trunk gate. Trunk-based workflow: `master` is the only long-lived branch,
# every change lands via a short-lived PR into master. These two jobs are the
# REQUIRED status checks on master PRs (kept fast on purpose); the heavy E2E suite
# runs at release time (see release.yml), not on every PR.
# The two jobs run in PARALLEL (separate runners) and are kept as distinct jobs
# because `master` branch protection requires these exact job names:
#   - "Lint, format, typecheck, assets"
#   - "Unit tests"
# Renaming or merging them into a single job would break those required checks.

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same PR (or branch, on push) so rapid pushes /
# force-updates don't leave stale runs burning minutes.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # All JS actions on Node 24 ahead of the 2026-06-16 default switch
  # (covers third-party actions still declaring node20, e.g. setup-bun).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Lint, format, typecheck, assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Check generated assets
        run: bun run --cwd packages/assets assets:check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package unit tests
        run: bun run test:unit

      - name: Run cross-game catalog unit tests
        run: bun run test:e2e:unit
