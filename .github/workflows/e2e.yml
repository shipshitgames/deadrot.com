name: Game E2E

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  affected-games:
    name: Detect affected games
    runs-on: ubuntu-latest
    outputs:
      game_slugs: ${{ steps.detect.outputs.game_slugs }}
      count: ${{ steps.detect.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect game E2E candidates
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node scripts/changed-e2e-games.mjs \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}"
          else
            node scripts/changed-e2e-games.mjs --all
          fi

  games:
    name: Cross-game Playwright
    needs: affected-games
    if: needs.affected-games.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run cross-game E2E tests
        run: bun run test:e2e
        env:
          CI: true
          E2E_GAME_SLUGS: ${{ needs.affected-games.outputs.game_slugs }}

      - name: Upload cross-game Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-game-e2e-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  docker-game-e2e:
    name: Dockerized game E2E
    needs: affected-games
    if: needs.affected-games.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Dockerized E2E
        run: ./scripts/run-e2e-docker.sh
        env:
          E2E_GAME_SLUGS: ${{ needs.affected-games.outputs.game_slugs }}

      - name: Upload Dockerized Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-game-e2e-${{ github.run_id }}
          path: .artifacts/e2e
          if-no-files-found: ignore
          retention-days: 14
