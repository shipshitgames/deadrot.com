name: Game E2E

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - ".agents/**"
      - ".claude/**"
      - "skills/**"
  push:
    branches:
      - develop
      - staging
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - ".agents/**"
      - ".claude/**"
      - "skills/**"
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

# Cancel superseded runs on the same ref (rapid pushes / PR force-updates).
concurrency:
  group: game-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected-games:
    name: Detect affected games
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      game_slugs: ${{ steps.detect.outputs.game_slugs }}
      game_slugs_json: ${{ steps.detect.outputs.game_slugs_json }}
      count: ${{ steps.detect.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect game E2E candidates
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node scripts/changed-e2e-games.mjs \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            node scripts/changed-e2e-games.mjs \
              --base "${{ github.event.before }}" \
              --head "${{ github.sha }}"
          else
            node scripts/changed-e2e-games.mjs --all
          fi

  games:
    name: Playwright (${{ matrix.game }}:${{ matrix.view }})
    needs: affected-games
    if: needs.affected-games.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # One runner per affected game × viewport, so desktop and mobile run in
      # parallel instead of serially within a single shard.
      matrix:
        game: ${{ fromJSON(needs.affected-games.outputs.game_slugs_json) }}
        view: [desktop, mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E (${{ matrix.game }}:${{ matrix.view }})
        run: bun run test:e2e
        env:
          CI: true
          E2E_GAME_SLUGS: ${{ matrix.game }}
          E2E_VIEWPORT: ${{ matrix.view }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.game }}-${{ matrix.view }}-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  docker-game-e2e:
    name: Dockerized game E2E
    needs: affected-games
    # Skip on pull_request — the matrix job above already covers PRs on the GH
    # runner. The pinned container only needs to stay green on pushes + the
    # weekly cron so the documented local-repro image (bun run e2e:docker) works.
    if: github.event_name != 'pull_request' && needs.affected-games.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E image (gha layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/e2e.Dockerfile
          tags: deadrotcom-e2e:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Dockerized E2E
        run: ./scripts/run-e2e-docker.sh
        env:
          E2E_SKIP_BUILD: "1"
          E2E_DOCKER_IMAGE: deadrotcom-e2e:local
          E2E_GAME_SLUGS: ${{ needs.affected-games.outputs.game_slugs }}

      - name: Upload Dockerized Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-game-e2e-${{ github.run_id }}
          path: .artifacts/e2e
          if-no-files-found: ignore
          retention-days: 14
