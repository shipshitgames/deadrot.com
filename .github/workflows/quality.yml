name: Quality

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, format, typecheck, assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Check generated assets
        run: bun run assets:check
