name: Release

# Trunk-based release. `master` is the only long-lived branch and every push to it
# is a releasable candidate, but pushing to master does NOT deploy on its own.
# Production is cut deliberately by pushing a semver tag:
#
#   git tag v1.4.0 && git push origin v1.4.0
#
# The tag runs the FULL heavy suite (all games' Playwright E2E, sharded per
# game x viewport, plus web E2E, lint/typecheck/assets, unit, secret scan). Only
# if every gate is green does the deploy job promote all games to production.
#
# Day-to-day PRs into master run the fast gate only (ci.yml); the expensive E2E
# lives here so merges stay quick while releases stay safe.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref (tag/sha) to release"
        required: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Lint, format, typecheck, assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run --cwd packages/assets assets:check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
      - run: bun run test:e2e:unit

  web-e2e:
    name: Web E2E (${{ matrix.view }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        view: [desktop, mobile]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test -c apps/web/playwright.config.ts --project web:${{ matrix.view }}
        env:
          CI: true

  all-games:
    name: Enumerate all games
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      game_slugs: ${{ steps.detect.outputs.game_slugs }}
      game_slugs_json: ${{ steps.detect.outputs.game_slugs_json }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        # A release validates EVERY game, not just changed ones.
        run: node scripts/changed-e2e-games.mjs --all

  game-e2e:
    name: Playwright (${{ matrix.game }}:${{ matrix.view }})
    needs: all-games
    if: needs.all-games.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        game: ${{ fromJSON(needs.all-games.outputs.game_slugs_json) }}
        view: [desktop, mobile]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
        env:
          CI: true
          E2E_GAME_SLUGS: ${{ matrix.game }}
          E2E_VIEWPORT: ${{ matrix.view }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-${{ matrix.game }}-${{ matrix.view }}-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: node scripts/check-secrets.mjs --history

  # Single gate so the deploy job has ONE dependency that means "everything green".
  release-gate:
    name: Release gate
    needs: [quality, unit, web-e2e, all-games, game-e2e, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All release checks passed for ${{ github.ref_name }}."

  deploy:
    name: Deploy all games to production
    needs: release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Deploy all games (production)
        # A release deploys the whole catalog so prod always matches the tag.
        run: node scripts/deploy-changed-games.mjs --all
