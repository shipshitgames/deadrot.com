name: Secret Scan

on:
  push:
    branches:
      - develop
      - staging
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan working tree and history
        run: node scripts/check-secrets.mjs --history
