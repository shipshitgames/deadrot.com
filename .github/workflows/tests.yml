name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package unit tests
        run: bun run test:unit

      - name: Run cross-game catalog unit tests
        run: bun run test:e2e:unit
