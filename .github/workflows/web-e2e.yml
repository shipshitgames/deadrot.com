name: Web E2E

# Smoke coverage for the hub/marketing surface (apps/web) — the waitlist + game
# access states (#355). Kept separate from the game E2E (e2e.yml), which shards
# per game and never picks up apps/web changes. Playwright boots `next dev` itself
# (apps/web/playwright.config.ts), so no game dev servers are needed here.

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/web-e2e.yml"
  push:
    branches:
      - develop
      - staging
      - main
      - master
    paths:
      - "apps/web/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/web-e2e.yml"
  workflow_dispatch:

concurrency:
  group: web-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # All JS actions on Node 24 ahead of the 2026-06-16 default switch
  # (covers third-party actions still declaring node20, e.g. setup-bun).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  web-e2e:
    name: Playwright (web:${{ matrix.view }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        view: [desktop, mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run web E2E (${{ matrix.view }})
        run: bunx playwright test -c apps/web/playwright.config.ts --project web:${{ matrix.view }}
        env:
          CI: true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-${{ matrix.view }}-${{ github.run_id }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
